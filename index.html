    <script>
        let selectedFiles = [];
        let destinationHandle;

        document.getElementById("fileInput").addEventListener("change", function () {
            selectedFiles = Array.from(this.files);
            if (selectedFiles.length === 0) {
                
                alert("⚠ Please select a file!");
                return;
            }

            document.getElementById("fileList").innerHTML = selectedFiles.map(file => `<p>${file.name}</p>`).join("");
            document.getElementById("saveFilesBtn").style.display = "none";
            document.getElementById("fastsave").style.display = "none";
        });

        async function selectDestination() {
            try {
                destinationHandle = await window.showDirectoryPicker();
                document.getElementById("selectedPath").innerText = `📂 Selected location: ${destinationHandle.name}`;
                document.getElementById("saveFilesBtn").style.display = "block";
                document.getElementById("fastsave").style.display = "block";
            } catch (error) {
                alert("❌ Error selecting location! Please try again");
            }
        }

        async function saveFiles() {
            if (!selectedFiles.length || !destinationHandle) {
                alert("⚠ Please specify the files and save path!");
                return;
            }


            let downloadArea = document.getElementById("downloadLinks");
            downloadArea.innerHTML = "";

            try {
                for (const file of selectedFiles) {
                    const newFileHandle = await destinationHandle.getFileHandle(file.name, { create: true });
                    const writableStream = await newFileHandle.createWritable();
                    await writableStream.write(await file.arrayBuffer());
                    await writableStream.close();

                    
                    let blob = new Blob([await file.arrayBuffer()], { type: file.type });
                    let url = URL.createObjectURL(blob);

                    let link = document.createElement("a");
                    link.href = url;
                    link.download = file.name;
                    link.innerText = `📂 Download file${file.name}`;
                    
                    downloadArea.appendChild(link);
                    downloadArea.appendChild(document.createElement("br"));
                }

                alert("✅ Files saved and custom download link created");
            } catch (error) {
                alert(`❌ Error saving files: ${error.message}`);
            }
        }

    async function speed() {
    if (!selectedFiles.length) {
        alert("⚠ No files selected!");
        return;
    }

    if (!destinationHandle) {
        alert("⚠ Please select a folder first!");
        return;
    }

    let downloadArea = document.getElementById("downloadLinks");
    downloadArea.innerHTML = "";

    try {
        
        let permissionStatus = await destinationHandle.requestPermission({ mode: "readwrite" });

        if (permissionStatus !== "granted") {
            alert("⚠ Permission denied! File transfer aborted.");
            return;
        }

        
        let wasmInstance = await loadOptimizedWasm();

        
        if (Notification.permission !== "granted") {
            await Notification.requestPermission();
        }

        let progressBoxes = document.querySelectorAll(".progress-box");
        let totalBoxes = progressBoxes.length; 

        for (const file of selectedFiles) {
            let fileData = await file.arrayBuffer();
            let totalBytes = fileData.byteLength;
            let cleanBlob = new Blob([fileData], { type: "application/octet-stream" });

            
            new Notification(`Transferring ${file.name}`, {
                body: "File transfer started...",
            });

            
            let optimizedData = wasmInstance ? wasmInstance.optimizeFile(cleanBlob) : cleanBlob;

            
            const newFileHandle = await destinationHandle.getFileHandle(file.name, { create: true });
            const writableStream = await newFileHandle.createWritable();

            let chunkSize = Math.max(totalBytes / totalBoxes, 1024);
            let filledCount = -1; 

            for (let i = 0; i < totalBytes; i += chunkSize) {
                let slice = fileData.slice(i, Math.min(i + chunkSize, totalBytes));
                await writableStream.write(slice);

                let progressPercentage = ((i / totalBytes) * 100).toFixed(2);
                let progressIndex = Math.max(0, Math.floor((progressPercentage / 10))); // تضمین مقدار صفر برای ۱۰٪ اول

                if (progressIndex > filledCount && progressIndex < totalBoxes) {
                    progressBoxes[progressIndex].classList.add("filled"); // پر کردن مربع بر اساس درصد واقعی
                    filledCount = progressIndex;
                }

                console.log(`⬆ Upload Progress: ${progressPercentage}%`);
            }


            progressBoxes[totalBoxes - 1].classList.add("filled");

            await writableStream.close();

            
            new Notification(`Transfer Completed`, {
                body: `${file.name} has been saved successfully!`,
            });

            
            let url = URL.createObjectURL(cleanBlob);
            let link = document.createElement("a");
            link.href = url;
            link.download = file.name;
            link.innerText = `📂 Download: ${file.name}`;

            downloadArea.appendChild(link);
            downloadArea.appendChild(document.createElement("br"));
        }

        alert("✅ Files saved successfully with turbo processing, metadata removal, permissions, and precise progress tracking!");
    } catch (error) {
        console.error("❌ Error saving files:", error);
        alert(`❌ Error: ${error.message}`);
    }
    }

    async function loadOptimizedWasm() {
    try {
        let response = await fetch("wasm/optimized.wasm");
        let wasmBinary = await response.arrayBuffer();
        let wasmModule = await WebAssembly.instantiate(wasmBinary);
        console.log("✅ WebAssembly Loaded Successfully!");
        return wasmModule.instance.exports;
    } catch (error) {
        console.error("❌ WebAssembly Load Error:", error);
        return null;
    }
    }
